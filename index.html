<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamiTop | Secure Assessment Platform</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="css/exam_v2.css"> 
    <link rel="manifest" href="manifest.json">

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(()=> console.log("PWA Ready"));
    }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <div class="app-header" style="position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <div class="app-header-inner" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border-secondary);">
            <div class="logo" onclick="nav('home')" style="cursor: pointer;" title="Go to Smart Hub">  
                <div class="logo-icon">E</div>
                <div class="logo-text">Exami<span>top</span></div>
            </div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 8px;">
                <button id="install-app-btn" class="btn btn-sm btn-success" onclick="installApp()" style="display:none; padding: 6px 12px; font-weight:600;">
                    <i class="ti ti-download" style="font-size: 18px; margin:0;"></i> 
                    <span class="hide-mobile" style="margin-left:6px;">Install App</span>
                </button>

                <button class="btn btn-sm" onclick="toggleDarkMode()" style="border-radius: 50%; width: 36px; height: 36px; padding: 0; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center;" title="Toggle Dark Mode">
                    <i class="ti ti-moon" style="font-size: 20px; margin:0;"></i>
                </button>

                <button class="btn btn-sm btn-ghost hide-mobile" onclick="nav('home')" style="padding: 6px 10px;">
                    <i class="ti ti-help" style="font-size: 18px; margin:0;"></i>
                </button>
                
                <button id="login-btn" class="btn btn-sm btn-primary" onclick="toggleLogin()" style="padding: 6px 14px; font-weight:600;">
                    <i class="ti ti-brand-google" style="font-size: 18px; margin:0;"></i> 
                    <span class="hide-mobile" style="margin-left:6px;">Login</span>
                </button>
            </div>
        </div>
        <div id="dynamic-nav-wrapper" class="hidden" style="background: #f8fafc; overflow-x: auto; border-bottom: 1px solid var(--color-border-secondary); scrollbar-width: none;">
            <div class="nav-tabs" id="dynamic-nav-tabs" style="display: flex; gap: 8px; padding: 10px 16px; width: max-content; margin: 0 auto;"></div>
        </div>
    </div>

    <div id="app-viewport" style="width: 100%; min-height: 80vh;">
        <div class="spinner-container" style="padding-top: 10vh;">
            <div class="spinner"></div>
            <div style="font-weight: 500; color: var(--color-text-secondary);">Loading Platform...</div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="modal-area" class="hidden">
        <div class="modal-bg" onclick="if(event.target===this)hideModal()">
            <div class="modal-box" id="modal-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
