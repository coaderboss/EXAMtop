<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamiTop | Secure Assessment Platform</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="css/exam.css">
    <link rel="manifest" href="manifest.json">

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(()=> console.log("PWA Ready"));
    }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <div class="app-header" style="position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <div class="app-header-inner" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border-secondary);">
            <div class="logo" onclick="nav('home')" style="cursor: pointer;" title="Go to Smart Hub">  
                <div class="logo-icon">E</div>
                <div class="logo-text">Exami<span>top</span></div>
            </div>
            <div class="header-actions" style="display: flex; align-items: center;">
                <button class="btn btn-sm" onclick="toggleDarkMode()" style="border-radius: 50%; width: 35px; height: 35px; padding: 0; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center; margin-right: 8px;" title="Toggle Dark Mode">
                <i class="ti ti-moon" style="font-size: 22px;"></i>
                </button>
                <button class="btn btn-sm" onclick="showHelpGuide()" style="border-radius: 50%; width: 35px; height: 35px; padding: 0; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); color: #185FA5; display: flex; align-items: center; justify-content: center;" title="Platform Guide & Instructions">
                    <i class="ti ti-info-circle" style="font-size: 22px;"></i>
                </button>
                <button class="btn btn-sm hidden" id="profile-btn" onclick="openProfileSettings()" style="border-radius: 50%; width: 35px; height: 35px; padding: 0; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); color: #185FA5; display: flex; align-items: center; justify-content: center; margin-left: 8px; margin-right: 8px;">
                    <i class="ti ti-user-circle" style="font-size: 24px;"></i>
                </button>
                <button class="btn btn-primary btn-sm" id="login-btn" onclick="toggleLogin()" style="border-radius: 20px; white-space: nowrap; font-weight: 600; padding: 8px 16px;">
                    <i class="ti ti-brand-google"></i> <span class="hide-on-mobile">Examiner </span>Login
                </button>
            </div>
        </div>
        <div id="dynamic-nav-wrapper" class="hidden" style="background: #f8fafc; overflow-x: auto; border-bottom: 1px solid var(--color-border-secondary); scrollbar-width: none;">
            <div class="nav-tabs" id="dynamic-nav-tabs" style="display: flex; gap: 8px; padding: 10px 16px; width: max-content; margin: 0 auto;"></div>
        </div>
    </div>

    <div id="app-viewport" style="width: 100%; min-height: 80vh;">
        <div class="spinner-container" style="padding-top: 10vh;">
            <div class="spinner"></div>
            <div style="font-weight: 500; color: var(--color-text-secondary);">Loading Platform...</div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="modal-area" class="hidden">
        <div class="modal-bg" onclick="if(event.target===this)hideModal()">
            <div class="modal-box" id="modal-box"></div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
    <div id="toast-container"></div>
    <div id="modal-area" class="hidden">
        <div class="modal-bg" onclick="if(event.target===this)hideModal()">
            <div class="modal-box" id="modal-box"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
</body>
</html>
