<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamiTop | Secure Assessment Platform</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="css/exam_v2.css"> 
    <link rel="manifest" href="manifest.json">

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(()=> console.log("PWA Ready"));
    }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <div class="app-header" style="position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <div class="app-header-inner" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border-secondary);">
            <div class="logo" onclick="nav('home')" style="cursor: pointer;" title="Go to Smart Hub">  
                <div class="logo-icon">E</div>
                <div class="logo-text">Exami<span>top</span></div>
            </div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
            
            <button id="install-app-btn" class="btn btn-sm btn-success hide-mobile" onclick="installApp()" style="display:none; padding: 6px 12px; font-weight:600;">
                <i class="ti ti-download" style="font-size: 16px; margin:0;"></i> 
                <span class="hide-mobile" style="margin-left:6px;">Install App</span>
            </button>

            <div style="position: relative;" id="settings-wrapper">
                <button class="btn btn-sm btn-ghost" onclick="toggleSettings()" style="border-radius: 50%; width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); margin-left: 8px;">
                    <i class="ti ti-settings" style="font-size: 20px; margin:0; color: var(--color-text-primary);"></i>
                </button>
                
                <div id="settings-dropdown" class="hidden" style="position: absolute; right: 0; top: 42px; width: 180px; background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; z-index: 1000; display: flex; flex-direction: column;">
                    
                    <button onclick="toggleDarkMode(); toggleSettings();" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: transparent; border: none; border-bottom: 1px solid var(--color-border-secondary); width: 100%; text-align: left; cursor: pointer; color: var(--color-text-primary); font-size: 13px; font-weight: 600;">
                        <i id="dark-mode-icon" class="ti ti-moon" style="font-size: 18px; color: #185FA5;"></i> 
                        <span id="dark-mode-text">Dark Mode</span>
                    </button>
                    
                    <button onclick="showHelpGuide(); toggleSettings();" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: transparent; border: none; border-bottom: 1px solid var(--color-border-secondary); width: 100%; text-align: left; cursor: pointer; color: var(--color-text-primary); font-size: 13px; font-weight: 600;">
                        <i class="ti ti-info-circle" style="font-size: 18px; color: #3B6D11;"></i> 
                        Platform Guide
                    </button>
                    
                    <button id="profile-menu-btn" class="hidden" onclick="openProfileSettings(); toggleSettings();" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: transparent; border: none; width: 100%; text-align: left; cursor: pointer; color: var(--color-text-primary); font-size: 13px; font-weight: 600;">
                        <i class="ti ti-user-circle" style="font-size: 18px; color: #854F0B;"></i> 
                        My Profile
                    </button>
                    
                </div>
            </div>
            
            <button id="login-btn" class="btn btn-sm btn-primary" onclick="toggleLogin()" style="padding: 6px 12px; font-weight:600;">
                <i class="ti ti-brand-google" style="font-size: 18px; margin:0;"></i> 
                <span class="hide-mobile" style="margin-left:6px;">Login</span>
            </button>
        </div>
        </div>
        <div id="dynamic-nav-wrapper" class="hidden" style="background: #f8fafc; overflow-x: auto; border-bottom: 1px solid var(--color-border-secondary); scrollbar-width: none;">
            <div class="nav-tabs" id="dynamic-nav-tabs" style="display: flex; gap: 8px; padding: 10px 16px; width: max-content; margin: 0 auto;"></div>
        </div>
    </div>

    <div id="app-viewport" style="width: 100%; min-height: 80vh;">
        <div class="spinner-container" style="padding-top: 10vh;">
            <div class="spinner"></div>
            <div style="font-weight: 500; color: var(--color-text-secondary);">Loading Platform...</div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="modal-area" class="hidden">
        <div class="modal-bg" onclick="if(event.target===this)hideModal()">
            <div class="modal-box" id="modal-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
