<div style="animation: fadeIn 0.3s ease; width: 100%; max-width: 1080px; margin: 0 auto; padding: 2rem 1.5rem;">
  <div id="student-home">
    <div style="max-width:460px;margin:3rem auto">
      <div class="card" style="box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: none;">
        <div style="text-align:center;margin-bottom:2rem">
          <div class="logo-icon" style="width:56px;height:56px;border-radius:14px;font-size:26px;margin:0 auto 1rem; box-shadow: 0 4px 10px rgba(24,95,165,0.3)">E</div>
          <div style="font-size:22px;font-weight:600; margin-bottom: 4px;">Join a Test</div>
          <div style="font-size:14px;color:var(--color-text-secondary)">Enter your details and the 6-digit test code</div>
        </div>
        <div style="margin-bottom:1rem"><label>Full Name</label><input type="text" id="s-name" placeholder="e.g. Rahul Kumar"></div>
        <div style="margin-bottom:1rem"><label>Roll Number (Optional)</label><input type="text" id="s-roll" placeholder="e.g. 2024CS001"></div>
        <div style="margin-bottom:2rem"><label>Test Code</label><input type="text" id="s-code" placeholder="ENTER CODE" style="text-transform:uppercase;letter-spacing:6px;font-size:20px;font-weight:600;text-align:center; height: 50px;" maxlength="6"></div>
        
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:16px;font-weight:600" onclick="joinTest()">
          Start Test <i class="ti ti-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>
  <div id="student-test" class="hidden"></div>
  <div id="student-result" class="hidden"></div>
</div>
